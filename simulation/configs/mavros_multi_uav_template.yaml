/**:
  ros__parameters:
    use_sim_time: true
    startup_px4_usb_quirk: false
    conn:
      timeout: 10.0
      heartbeat_rate: 1.0
      timesync_rate: 10.0
      system_time_rate: 1.0
    setpoint_velocity:
      mav_frame: LOCAL_NED
    local_position:
      frame_id: map
      tf:
        send: false
    global_position:
      use_relative_alt: true
